<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient border -->
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- Border circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#borderGradient)" stroke-width="3" opacity="0.8"/>
  
  <!-- Colorful dots (Toko logo inspired) -->
  <circle cx="110" cy="70" r="15" fill="#FF6B6B"/>
  <circle cx="130" cy="90" r="15" fill="#4ECDC4"/>
  <circle cx="115" cy="115" r="15" fill="#95E1D3"/>
  <circle cx="85" cy="120" r="15" fill="#FFE66D"/>
</svg>
